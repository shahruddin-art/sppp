# ================================================
# SPPP-MBI - Google Cloud Build Configuration
# ================================================
# This file configures CI/CD for deploying to Google Cloud Run
#
# Prerequisites:
# 1. Enable Cloud Build API in your GCP project
# 2. Enable Cloud Run API
# 3. Enable Cloud SQL Admin API
# 4. Enable Artifact Registry API
# 5. Create a Cloud SQL PostgreSQL instance
# 6. Create a database and user
# 7. Set up secrets in Secret Manager
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml
#
# Or set up a Cloud Build trigger for automatic deploys on git push
# ================================================

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi:latest'
      - '--build-arg'
      - 'DOCKER_BUILD=1'
      - '.'
    id: 'build-image'
    timeout: '600s'

  # Step 2: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi'
    id: 'push-image'
    dependsOn: ['build-image']
    timeout: '300s'

  # Step 3: Run Prisma migrations
  - name: '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi:${SHORT_SHA}'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npx prisma migrate deploy'
    id: 'run-migrations'
    dependsOn: ['push-image']
    env:
      - 'DATABASE_URL=$$DATABASE_URL'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--set-secrets=DATABASE_URL=${_DB_SECRET_NAME}:latest,JWT_SECRET=${_JWT_SECRET_NAME}:latest'
      - '--set-env-vars=NODE_ENV=production'
      - '--add-cloudsql-instances=${_CLOUDSQL_INSTANCE}'
    id: 'deploy-cloud-run'
    dependsOn: ['run-migrations']

# Substitution variables (set these in Cloud Build trigger or override via command line)
substitutions:
  _REGION: 'asia-southeast1'
  _REPO_NAME: 'sppp-mbi-repo'
  _SERVICE_NAME: 'sppp-mbi'
  _MEMORY: '1Gi'
  _CPU: '1'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '3'
  _DB_SECRET_NAME: 'sppp-mbi-database-url'
  _JWT_SECRET_NAME: 'sppp-mbi-jwt-secret'
  _CLOUDSQL_INSTANCE: ''

# Secret configuration
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/sppp-mbi-database-url/versions/latest
      env: 'DATABASE_URL'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Images to keep in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/sppp-mbi:latest'
